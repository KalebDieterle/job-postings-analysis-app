name: Lighthouse CI

on:
  pull_request:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ML_SERVICE_URL: ${{ secrets.ML_SERVICE_URL || 'http://localhost:8000' }}
      ML_SERVICE_KEY: ${{ secrets.ML_SERVICE_KEY || 'local-dev-key' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DOCKER_BUILD: "0"

      - name: Start app
        run: npm run start -- --port 3100 &

      - name: Wait for app
        run: |
          for i in {1..45}; do
            if curl -fsS http://localhost:3100 > /dev/null; then exit 0; fi
            sleep 2
          done
          exit 1

      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
