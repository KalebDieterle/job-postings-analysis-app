name: Weekly ML Model Retraining

on:
  schedule:
    # Run every Sunday at 6:00 AM UTC (after daily imports)
    - cron: "0 6 * * 0"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ml-retrain
  cancel-in-progress: false

jobs:
  retrain-and-deploy:
    name: Train ML Models & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        working-directory: ml-service
        run: pip install -r requirements.txt

      - name: Train salary models
        working-directory: ml-service/training
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MODEL_DIR: ../models
        run: |
          echo "::add-mask::$DATABASE_URL"
          echo "Starting training at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python train_salary.py

      - name: Verify model artifacts
        working-directory: ml-service
        run: |
          echo "Model artifacts:"
          ls -la models/
          # Check that critical files exist
          test -f models/salary_median.lgb || (echo "Missing salary_median.lgb" && exit 1)
          test -f models/salary_encoders.joblib || (echo "Missing salary_encoders.joblib" && exit 1)

      - name: Enforce salary-only model artifacts
        working-directory: ml-service
        run: |
          set -euo pipefail

          # Legacy artifacts must not exist.
          if ls models/tfidf_* models/cluster_* >/dev/null 2>&1; then
            echo "Legacy TF-IDF/cluster artifacts detected in models/."
            ls -la models/tfidf_* models/cluster_* 2>/dev/null || true
            exit 1
          fi

          # Model file changes in this run must stay within the salary allowlist.
          mapfile -t changed_model_paths < <(git status --porcelain -- models/ | awk '{print $2}')
          if [ "${#changed_model_paths[@]}" -eq 0 ]; then
            echo "No model file changes detected."
            exit 0
          fi

          allowed_paths=(
            "ml-service/models/salary_median.lgb"
            "ml-service/models/salary_p10.lgb"
            "ml-service/models/salary_p90.lgb"
            "ml-service/models/salary_encoders.joblib"
            "ml-service/models/salary_feature_columns.joblib"
            "ml-service/models/salary_skill_vocab.joblib"
            "ml-service/models/salary_company_scale_meta.joblib"
            "ml-service/models/salary_titles.joblib"
            "ml-service/models/salary_premiums.joblib"
          )

          for changed_path in "${changed_model_paths[@]}"; do
            is_allowed=false
            for allowed_path in "${allowed_paths[@]}"; do
              if [ "$changed_path" = "$allowed_path" ]; then
                is_allowed=true
                break
              fi
            done

            if [ "$is_allowed" = false ]; then
              echo "Disallowed model file change detected: $changed_path"
              echo "Only salary allowlist artifacts may change in this workflow."
              exit 1
            fi
          done

      - name: Deploy to Fly.io
        if: success()
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fly deploy
        if: success()
        working-directory: ml-service
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            flyctl deploy --remote-only
          else
            echo "FLY_API_TOKEN not set — skipping deployment"
          fi

      - name: Training summary
        if: always()
        run: |
          echo "Retraining completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
